<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shield body -->
  <path d="M32 4 L56 14 L56 34 C56 48 44 58 32 62 C20 58 8 48 8 34 L8 14 Z"
        fill="#1a2e4a" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Inner shield -->
  <path d="M32 10 L50 18 L50 34 C50 45 42 53 32 57 C22 53 14 45 14 34 L14 18 Z"
        fill="#0f1f35" opacity="0.7"/>
  <!-- Route: start dot -->
  <circle cx="20" cy="42" r="3.5" fill="#34d399"/>
  <!-- Route line -->
  <polyline points="20,42 20,28 44,28" fill="none" stroke="#34d399"
            stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead -->
  <polygon points="44,21 52,28 44,35" fill="#34d399"/>
  <!-- Destination dot -->
  <circle cx="52" cy="28" r="3" fill="#f59e0b"/>
</svg>
