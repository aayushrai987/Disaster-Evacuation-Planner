<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disaster Evacuation Planner</title>

    <!--
      Favicon strategy for full cross-browser support including Safari:
        1. rel="icon" type="image/svg+xml"  → Chrome 80+, Firefox 41+, Edge 80+, Safari 12+ (tab icon)
        2. rel="shortcut icon"              → Safari legacy fallback, IE, older Chromium
        3. rel="mask-icon"                  → Safari pinned-tab sidebar icon (must be monochrome SVG)
        4. rel="apple-touch-icon"           → iOS Safari / macOS "Add to Home Screen" bookmark
        5. theme-color meta                 → Android Chrome & Samsung Internet address-bar tint
    -->
    <link rel="icon"          type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon"                          href="/favicon.svg" color="#dc2626" />
    <link rel="apple-touch-icon"                   href="/favicon.svg" />
    <meta name="theme-color" content="#dc2626" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
